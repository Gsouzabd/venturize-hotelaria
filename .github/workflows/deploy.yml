name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          echo "${SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${SSH_PORT}" "${SSH_HOST}" >> ~/.ssh/known_hosts

      - name: Deploy files via rsync
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          REMOTE_PATH: ${{ secrets.SSH_REMOTE_PATH }}
        run: |
          rsync -az \
            --exclude '.git/' \
            --exclude 'node_modules/' \
            --exclude 'vendor/' \
            --exclude 'storage/' \
            --exclude '.env' \
            --exclude 'tests/' \
            --exclude 'resources/js/' \
            --exclude 'resources/css/' \
            --exclude 'database/seeders/' \
            --exclude 'printingAgent/' \
            --exclude 'bitz-exports/' \
            --exclude 'bootstrap/cache/' \
            --exclude '.claude/' \
            --exclude 'make-deploy*' \
            --exclude 'deploy.py' \
            -e "ssh -p ${SSH_PORT} -o StrictHostKeyChecking=no" \
            ./ \
            "${SSH_USER}@${SSH_HOST}:${REMOTE_PATH}/"

      - name: Run post-deploy commands
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key_path: ~/.ssh/id_rsa
          script: |
            cd ${{ secrets.SSH_REMOTE_PATH }}
            php artisan migrate --force
            php artisan cache:clear && php artisan config:clear && php artisan route:clear && php artisan view:clear
            php artisan route:cache && php artisan config:cache
